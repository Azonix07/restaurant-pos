<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant POS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6366f1 100%);
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
  }
  .logo {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    margin-bottom: 24px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    opacity: 0.8;
    margin-bottom: 40px;
  }
  .loader-container {
    width: 240px;
    text-align: center;
  }
  .progress-bar {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: #fff;
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .status {
    font-size: 12px;
    opacity: 0.7;
    min-height: 18px;
  }
  .dots::after {
    content: '';
    animation: dots 1.5s steps(3, end) infinite;
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }
  .version {
    position: absolute;
    bottom: 16px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>
</head>
<body>
  <div class="logo">🍽️</div>
  <h1>Restaurant POS</h1>
  <p class="subtitle">Point of Sale System</p>
  <div class="loader-container">
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>
    <p class="status" id="status">Starting up<span class="dots"></span></p>
  </div>
  <p class="version">v1.0.0</p>
  <script>
    const progress = document.getElementById('progress');
    const status = document.getElementById('status');

    // Called from main process via executeJavaScript
    function updateStatus(text, pct) {
      progress.style.width = pct + '%';
      status.innerHTML = text + '<span class="dots"></span>';
    }

    // Fallback animation if main process hasn't sent updates within 2s
    let fallbackTimer = setTimeout(() => {
      updateStatus('Initializing', 5);
    }, 2000);
  </script>
</body>
</html>
