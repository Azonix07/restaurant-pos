name: Build Desktop Installers

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm install --omit=dev

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install electron dependencies
        run: cd electron && npm install

      - name: Build Windows installer
        run: cd electron && npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            electron/dist/*.exe
            electron/dist/*.exe.blockmap

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm install --omit=dev

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install electron dependencies
        run: cd electron && npm install

      - name: Build macOS installer
        run: cd electron && npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: electron/dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: cd backend && npm install --omit=dev

      - name: Install frontend dependencies & build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Install electron dependencies
        run: cd electron && npm install

      - name: Build Linux installer
        run: cd electron && npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: electron/dist/*.AppImage
